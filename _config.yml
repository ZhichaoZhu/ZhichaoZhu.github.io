# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Zhichao Zhu
subtitle: ''
description: ''
keywords:
author: Zhichao Zhu
language: en
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://zhichaozhu.github.io/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: false # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: cactus

theme_config:
  colorscheme: white
  
  projects_url: https://github.com/ZhichaoZhu
  publishes_url: https://scholar.google.com/citations?user=UwfuwtEAAAAJ&hl=zh-CN
  
  nav:
    home: /
    AboutMe: /about/
    Blogs: /archives/
    GoogleScholar: https://scholar.google.com/citations?user=UwfuwtEAAAAJ&hl=zh-CN
    search: /search/
  
  mathjax:
    enabled: true
  
  # Customize the archive view.
  # Options:
  #   - sort_updated: sort posts by last modification date instead of creation date.
  # Note: this does not work together with pagination, since the pagination
  # plugin will sort pages by date of creation.
  archive:
    sort_updated: true

  # Customize the article view.
  # Options:
  #   - show_updated: show the last modification date.
  post:
    show_updated: true

  # Links to your social media accounts.
  # The 'icon' keys should correspond to Fontawesome icon names
  # (see https://fontawesome.com/icons?d=gallery&s=brands);
  # only 'mail' is an exception.
  # You can optionally add a 'label' key to set the title attribute on the link. 
  # 'icon' value will be used as title when 'label' is missing.
  social_links:
    -
      icon: github
      link: https://github.com/ZhichaoZhu
    -
      icon: mail
      link: mailto:zachary_zhu@outlook.com

  # Fill in your Google Analytics tracking ID to enable Google Analytics.
  google_analytics:
    enabled: false
    id: UA-86660611-1

  # Fill in your Baidu Analytics tracking ID to enable Baidu Analytics.
  baidu_analytics:
    enabled: false
    id: 2e6da3c375c8a87f5b664cea6d4cb29c

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: 'git'
  repo: https://github.com/ZhichaoZhu/ZhichaoZhu.github.io
  branch: main
